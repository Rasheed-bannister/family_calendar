name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"

    - name: Run tests
      run: |
        uv run pytest -v --tb=short
      env:
        CALENDAR_WEATHER_LATITUDE: "40.7128"
        CALENDAR_WEATHER_LONGITUDE: "-74.0060"
        CALENDAR_TIMEZONE: "America/New_York"

    - name: Verify version consistency
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
        PYPROJECT_VERSION=$(python -c "
        import re
        with open('pyproject.toml') as f:
            match = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
            print(match.group(1))
        ")
        echo "Tag version: $TAG_VERSION"
        echo "VERSION file: $FILE_VERSION"
        echo "pyproject.toml: $PYPROJECT_VERSION"
        if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
          echo "ERROR: Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
          exit 1
        fi
        if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
          echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
          exit 1
        fi
        echo "All versions match: $TAG_VERSION"

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate release notes
      id: notes
      run: |
        # Get the previous tag
        PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
        if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
          # First release - use all commits
          echo "First release"
          NOTES=$(git log --pretty=format:"- %s" HEAD)
        else
          NOTES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
        fi
        # Write to file to preserve newlines
        echo "$NOTES" > /tmp/release_notes.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        body_path: /tmp/release_notes.txt
        make_latest: true
